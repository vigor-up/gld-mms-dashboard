<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL · 黃金多周期動量系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  .signal-pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }
  html { scroll-behavior:smooth; }
</style>
</head>
<body class="bg-white font-sans text-gray-800 min-h-screen">

<!-- 頂部導航 -->
<header class="sticky top-0 bg-white border-b border-gray-200 shadow-sm z-50">
  <div class="max-w-6xl mx-auto px-4 md:px-6 py-3 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-gray-900 rounded-full flex items-center justify-center">
        <span class="text-white text-xs font-bold">S</span>
      </div>
      <h1 class="text-lg font-bold text-gray-900 tracking-tight">SIGNAL 黃金系統</h1>
    </div>
    <div class="flex items-center gap-4">
      <div id="live-time" class="text-xs text-gray-400 font-mono"></div>
      <div id="live-status" class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-gray-300"></span>
        <span class="text-xs text-gray-400">等待連線</span>
      </div>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 md:px-6 py-6 space-y-8">

  <!-- 核心信號卡片 -->
  <section id="signal">
    <h2 class="text-base font-semibold text-gray-500 uppercase tracking-widest mb-4" style="font-size:0.7rem">實時交易信號</h2>
    <div id="signal-cards" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- 動態生成 -->
      <div class="bg-gray-50 border border-gray-200 rounded-xl p-6 text-center text-gray-400 text-sm">載入中…</div>
      <div class="bg-gray-50 border border-gray-200 rounded-xl p-6 text-center text-gray-400 text-sm">載入中…</div>
    </div>
  </section>

  <!-- 大盤圖表 -->
  <section id="chart">
    <h2 class="text-base font-semibold text-gray-500 uppercase tracking-widest mb-4" style="font-size:0.7rem">黃金 / 白銀 走勢</h2>
    <div class="bg-white border border-gray-200 rounded-xl p-4 md:p-6" style="height:320px">
      <canvas id="mainChart"></canvas>
    </div>
  </section>

  <!-- 三市場信心 -->
  <section id="confidence">
    <h2 class="text-base font-semibold text-gray-500 uppercase tracking-widest mb-4" style="font-size:0.7rem">市場信心指數</h2>
    <div id="conf-cards" class="grid grid-cols-3 gap-3">
      <!-- 動態生成 -->
    </div>
  </section>

  <!-- 近期記錄 -->
  <section id="history">
    <h2 class="text-base font-semibold text-gray-500 uppercase tracking-widest mb-4" style="font-size:0.7rem">近期交易記錄</h2>
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wider">
            <th class="px-4 py-3 font-medium">時間</th>
            <th class="px-4 py-3 font-medium">標的</th>
            <th class="px-4 py-3 font-medium">信號</th>
            <th class="px-4 py-3 font-medium text-center">信心</th>
            <th class="px-4 py-3 font-medium text-right">進場價</th>
            <th class="px-4 py-3 font-medium text-right">5日結果</th>
            <th class="px-4 py-3 font-medium text-center">勝負</th>
          </tr>
        </thead>
        <tbody id="history-body" class="divide-y divide-gray-100">
          <tr><td colspan="7" class="px-4 py-8 text-center text-gray-400 text-sm">暫無記錄</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- 自訂標的 -->
  <section id="custom">
    <h2 class="text-base font-semibold text-gray-500 uppercase tracking-widest mb-4" style="font-size:0.7rem">自訂追蹤</h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <div class="flex items-center gap-2 border border-gray-200 rounded-lg px-3 py-2">
        <span class="text-xs text-gray-400 w-16 shrink-0">台股</span>
        <input id="ticker-tw" type="text" value="2330.TW" class="flex-1 text-sm font-medium outline-none bg-transparent" maxlength="12">
        <button onclick="refreshTickers()" class="text-xs bg-gray-900 text-white px-2.5 py-1 rounded hover:bg-gray-700 transition">更新</button>
      </div>
      <div class="flex items-center gap-2 border border-gray-200 rounded-lg px-3 py-2">
        <span class="text-xs text-gray-400 w-16 shrink-0">美股</span>
        <input id="ticker-us" type="text" value="NVDA" class="flex-1 text-sm font-medium outline-none bg-transparent" maxlength="10">
        <button onclick="refreshTickers()" class="text-xs bg-gray-900 text-white px-2.5 py-1 rounded hover:bg-gray-700 transition">更新</button>
      </div>
      <div class="flex items-center gap-2 border border-gray-200 rounded-lg px-3 py-2">
        <span class="text-xs text-gray-400 w-16 shrink-0">白銀</span>
        <input id="ticker-si" type="text" value="SI=F" class="flex-1 text-sm font-medium outline-none bg-transparent" maxlength="10">
        <button onclick="refreshTickers()" class="text-xs bg-gray-900 text-white px-2.5 py-1 rounded hover:bg-gray-700 transition">更新</button>
      </div>
    </div>
  </section>

</main>

<!-- 頁尾 -->
<footer class="border-t border-gray-200 py-4 px-4 text-center text-xs text-gray-400 mt-8">
  <p>SIGNAL v5.0 · XGBoost+COT 多周期模型 ｜ 數據僅供參考，不構成投資建議</p>
</footer>

<script>
// ─── 配置 ───
const S3 = 'https://gld-mms-data-richtrong.s3.ap-northeast-1.amazonaws.com/data.json';
const LS_TW = 'sig_tw'; const LS_US = 'sig_us'; const LS_SI = 'sig_si';
const SIG = {
  STRONG_BUY:  { label:'強力買進', color:'#16a34a', bg:'bg-green-50', border:'border-green-500', badge:'bg-green-500', text:'text-white', icon:'▲' },
  BUY:         { label:'買進',     color:'#16a34a', bg:'bg-green-50', border:'border-green-500', badge:'bg-green-500', text:'text-white', icon:'△' },
  PRE_BUY:     { label:'準備買進', color:'#ca8a04', bg:'bg-yellow-50',border:'border-yellow-400',badge:'bg-yellow-400',text:'text-white',icon:'◉' },
  HOLD:        { label:'觀望',     color:'#6b7280', bg:'bg-gray-50',  border:'border-gray-300',  badge:'bg-gray-400',  text:'text-white',icon:'—' },
  SELL:        { label:'賣出',     color:'#dc2626', bg:'bg-red-50',   border:'border-red-500',    badge:'bg-red-500',   text:'text-white',icon:'▽' },
  STRONG_SELL: { label:'強力賣出', color:'#dc2626', bg:'bg-red-50',   border:'border-red-500',   badge:'bg-red-500',   text:'text-white',icon:'▼' },
};
function sigKey(s){ if(s>=80)return'STRONG_BUY';if(s>=65)return'BUY';if(s>=55)return'PRE_BUY';if(s>=45)return'HOLD';if(s>=30)return'SELL';return'STRONG_SELL'; }
function fmt(p){ if(!p)return'--'; return p>100?'$'+p.toLocaleString(undefined,{maximumFractionDigits:1}):'$'+p.toFixed(2); }

// ─── 繪製信號卡片 ───
function renderCard(d){
  if(!d || d.score==null){ return `<div class="bg-gray-50 border border-gray-200 rounded-xl p-6 text-center text-gray-400 text-sm">暫無數據</div>`; }
  const s = SIG[sigKey(d.score)||'HOLD'];
  const ch = d.change??0;
  const chCls = ch>=0?'text-green-600':'text-red-600';
  const chSign = ch>=0?'+':'';
  const fxs = Object.entries(d.factors||{}).slice(0,4);
  return `<div class="${s.bg} border-2 ${s.border} rounded-xl p-5 signal-pulse">
    <div class="flex justify-between items-start mb-3">
      <div>
        <div class="text-xs text-gray-400 mb-0.5">${d.ticker||d.name||'--'}</div>
        <div class="text-lg font-bold" style="color:${s.color}">${d.name||d.ticker||'--'}</div>
      </div>
      <div class="text-right">
        <div class="text-2xl font-black" style="color:${s.color}">${s.icon}</div>
        <div class="text-xs font-semibold mt-0.5" style="color:${s.color}">${s.label}</div>
      </div>
    </div>
    <div class="text-3xl font-black text-gray-900 mb-1">${fmt(d.price)}</div>
    <div class="text-sm ${chCls} mb-3 font-medium">${chSign}${ch.toFixed(2)}%</div>
    <div class="flex items-center gap-2 mb-3">
      <div class="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
        <div class="h-full rounded-full transition-all duration-1000" style="width:${d.score}%;background:${s.color}"></div>
      </div>
      <span class="text-xs font-bold text-gray-600 w-10 text-right">${d.score}%</span>
    </div>
    <div class="grid grid-cols-2 gap-1">${fxs.map(([k,v])=>`<div class="text-xs text-gray-500 flex justify-between px-2 py-1 bg-white/60 rounded"><span>${k}</span><span class="font-medium text-gray-700">${v}</span></div>`).join('')}</div>
  </div>`;
}

// ─── 繪製信心指數 ───
function renderConf(d, label){
  if(!d)return`<div class="bg-gray-50 border border-gray-200 rounded-xl p-4 text-center text-xs text-gray-400">--</div>`;
  const s=SIG[sigKey(d.score)||'HOLD'];
  return `<div class="bg-white border ${s.border} rounded-xl p-4">
    <div class="text-xs text-gray-400 mb-1">${label}</div>
    <div class="text-2xl font-black text-gray-900 mb-1">${d.score??'--'}%</div>
    <div class="text-xs font-semibold" style="color:${s.color}">${s.label}</div>
    <div class="mt-2 h-1 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${d.score??0}%;background:${s.color}"></div></div>
  </div>`;
}

// ─── 繪製歷史 ───
function renderHistory(rows){
  if(!rows?.length) return`<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400 text-sm">暫無記錄</td></tr>`;
  return rows.map(r=>{
    const s=SIG[r.signal]||SIG['HOLD'];
    const rCls=r.result==='HIT'?'text-green-600':r.result==='MISS'?'text-red-600':'text-gray-400';
    const rTxt=r.result==='HIT'?'✓ 命中':r.result==='MISS'?'✗ 失誤':'--';
    return`<tr class="hover:bg-gray-50 transition">
      <td class="px-4 py-3 text-gray-500 text-xs">${r.time||'--'}</td>
      <td class="px-4 py-3 font-medium text-sm">${r.ticker||'--'}</td>
      <td class="px-4 py-3"><span class="inline-block ${s.badge} ${s.text} text-xs font-bold px-2 py-0.5 rounded">${s.label}</span></td>
      <td class="px-4 py-3 text-center text-sm font-medium">${r.confidence??'--'}%</td>
      <td class="px-4 py-3 text-right text-sm">${r.entry?fmt(r.entry):'--'}</td>
      <td class="px-4 py-3 text-right text-sm ${r.exit5d>0?'text-green-600':r.exit5d<0?'text-red-600':''}">${r.exit5d?(r.exit5d>0?'+':'')+r.exit5d.toFixed(1)+'%':'進行中'}</td>
      <td class="px-4 py-3 text-center text-xs ${rCls} font-bold">${rTxt}</td>
    </tr>`;
  }).join('');
}

// ─── 圖表 ───
let chart=null;
function renderChart(gold, silver){
  const labels=['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00'];
  const gData=(gold?.change_list||[17200,17250,17180,17300,17220,17400,17450,17500,17600]).slice(-9);
  const sData=(silver?.change_list||[18.2,18.4,18.3,18.5,18.4,18.6,18.8,18.7,18.9]).slice(-9);
  const ctx=document.getElementById('mainChart').getContext('2d');
  if(chart)chart.destroy();
  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        { label:'黃金', data:gData, borderColor:'#c9a46c', backgroundColor:'rgba(201,164,108,0.08)', borderWidth:2.5, tension:0.4, fill:true, pointRadius:3, pointBackgroundColor:'#c9a46c' },
        { label:'白銀', data:sData, borderColor:'#94a3b8', backgroundColor:'rgba(148,163,184,0.06)', borderWidth:2,   tension:0.4, fill:true, pointRadius:3, pointBackgroundColor:'#94a3b8', yAxisID:'y1' }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ position:'top', labels:{ font:{ family:"DM Sans", size:12 }, color:'#6b7280', usePointStyle:true, pointStyle:'circle', padding:20 } }},
      scales:{
        y:{ type:'linear', position:'left', grid:{ color:'rgba(0,0,0,0.05)' }, ticks:{ font:{ family:"DM Sans", size:11 }, color:'#9ca3af' }},
        y1:{ type:'linear', position:'right', grid:{ drawOnChartArea:false }, ticks:{ font:{ family:"DM Sans", size:11 }, color:'#94a3b8' }},
        x:{ grid:{ color:'rgba(0,0,0,0.03)' }, ticks:{ font:{ family:"DM Sans", size:11 }, color:'#9ca3af' }}
      }
    }
  });
}

// ─── 主更新 ───
async function update(){
  try{
    const r=await fetch(S3+'?t='+Date.now());
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();

    // 狀態
    document.querySelector('#live-status span:first-child').className='w-2 h-2 rounded-full bg-green-500';
    document.querySelector('#live-status span:last-child').textContent='已連線';

    // 信號卡片：黃金 + 台股
    const twT=localStorage.getItem(LS_TW)||'2330.TW';
    const usT=localStorage.getItem(LS_US)||'NVDA';
    const siT=localStorage.getItem(LS_SI)||'SI=F';
    const cards=[
      d.assets?.gold||{name:'黃金',ticker:'GC=F',score:d.score??50,price:d.gold?.price,change:d.gold?.change??0,
        factors:{'XGBoost':(d.score??'--')+'%','ETF流向':d.smart_money?.etf_flow||'--','COT報告':d.smart_money?.cot_report||'--'}},
      d.assets?.tw?.score!=null ? d.assets.tw : {name:twT.replace('.TW',''),ticker:twT,score:d.assets?.tw?.score??null,
        price:d.assets?.tw?.price,change:d.assets?.tw?.change??0,factors:d.assets?.tw?.factors||{}}
    ];
    document.getElementById('signal-cards').innerHTML=cards.map(c=>renderCard(c)).join('');

    // 信心指數
    const conf=[d.assets?.gold||null, d.assets?.tw||null, d.assets?.us||null];
    document.getElementById('conf-cards').innerHTML=[
      renderConf(conf[0],'黃金 GC=F'),
      renderConf(conf[1],'台股 '+localStorage.getItem(LS_TW)||'2330.TW'),
      renderConf(conf[2],'美股 '+localStorage.getItem(LS_US)||'NVDA')
    ].join('');

    // 歷史
    if(d.history) document.getElementById('history-body').innerHTML=renderHistory(d.history);

    // 圖表
    renderChart(d.assets?.gold, d.assets?.silver);

    // 更新時間
    const ts=d.timestamp?new Date(d.timestamp).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'--';
    document.querySelector('footer p').textContent=`SIGNAL v5.0 · XGBoost+COT · 最後更新：${ts} ｜ 數據僅供參考，不構成投資建議`;
  }catch(e){
    document.querySelector('#live-status span:first-child').className='w-2 h-2 rounded-full bg-red-500';
    document.querySelector('#live-status span:last-child').textContent='連線失敗';
    console.error(e);
  }
}

function refreshTickers(){
  const tw=document.getElementById('ticker-tw').value.trim().toUpperCase();
  const us=document.getElementById('ticker-us').value.trim().toUpperCase();
  const si=document.getElementById('ticker-si').value.trim().toUpperCase();
  if(tw) localStorage.setItem(LS_TW,tw.includes('.TW')?tw:tw+'.TW');
  if(us) localStorage.setItem(LS_US,us);
  if(si) localStorage.setItem(LS_SI,si.includes('=')?si:si);
  update();
}

// 初始化輸入框
document.getElementById('ticker-tw').value=localStorage.getItem(LS_TW)||'2330.TW';
document.getElementById('ticker-us').value=localStorage.getItem(LS_US)||'NVDA';
document.getElementById('ticker-si').value=localStorage.getItem(LS_SI)||'SI=F';

// 即時時鐘
function tick(){ document.getElementById('live-time').textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false}); }
tick(); setInterval(tick,1000);
update(); setInterval(update,60000);
</script>
</body>
</html>
