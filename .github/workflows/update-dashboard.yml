name: GLD-MMS 24H Ensemble XGBoost v2.0

on:
  workflow_dispatch:
  schedule:
    # 每 15 分鐘執行一次
    - cron: '*/15 * * * *'

concurrency:
  group: gld-mms-updater
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Ensemble 首次訓練需要較長時間

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install \
            'yfinance==0.2.40' \
            pandas numpy requests boto3 \
            xgboost lightgbm catboost \
            scikit-learn

      - name: Run updater (Ensemble + Dashboard)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # 自選股 ticker（改這 4 行 commit 即可，15 分內生效）
          TW_TICKER: '0050.TW'
          TW_NAME:   '元大台灣50'
          US_TICKER: 'NVDA'
          US_NAME:   'NVIDIA'
          BARK_KEY_1: ${{ secrets.BARK_KEY_1 }}
          BARK_KEY_2: ${{ secrets.BARK_KEY_2 }}
          BARK_KEY_3: ${{ secrets.BARK_KEY_3 }}
          # AWS（已移除 Lambda，僅保留 key 供舊版相容）
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Twelve Data（自選股 + 黃金 Ensemble 訓練資料）
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          # Cloudflare R2（存 Ensemble 模型 + signal state/history）
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: 'https://adb1040c847f4ae4a7d6bfedcccd7b77.r2.cloudflarestorage.com'
          R2_BUCKET: 'richtrong-collect'
        run: |
          python update_gld_data.py \
            --html docs/index.html \
            --fred-key "${FRED_API_KEY:-}" \
            --bark-key-1 "${BARK_KEY_1:-}" \
            --bark-key-2 "${BARK_KEY_2:-}" \
            --bark-key-3 "${BARK_KEY_3:-}" \
            --aws-access-key "${AWS_ACCESS_KEY_ID:-}" \
            --aws-secret-key "${AWS_SECRET_ACCESS_KEY:-}" \
            --twelve-data-key "${TWELVE_DATA_KEY:-}" \
            --r2-access-key "${R2_ACCESS_KEY_ID:-}" \
            --r2-secret-key "${R2_SECRET_ACCESS_KEY:-}" \
            --r2-endpoint "${R2_ENDPOINT_URL:-}" \
            --r2-bucket "${R2_BUCKET:-}" || true

      - name: Force touch timestamp if no change
        run: |
          git add docs/index.html
          if git diff --staged --quiet; then
            TS=$(date -u +"%Y-%m-%dT%H:%M:%S.%6NZ")
            sed -i "s/\"timestamp\": \"[^\"]*\"/\"timestamp\": \"${TS}\"/" docs/index.html
            echo "[INFO] 強制更新 timestamp: ${TS}"
          fi

      - name: Commit & push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name  "actions-user"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "沒有任何變更，跳過 commit"
          else
            git commit -m "v2.0 Ensemble XGBoost 更新: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S') 台北"
            git push origin main
          fi

      - name: Purge Cloudflare cache
        if: success()
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/3ceea59661db3f8fddd4b05167627b68/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' || echo "Cloudflare purge skipped"
